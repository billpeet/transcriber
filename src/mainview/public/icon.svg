<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="mic" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#312e81" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Microphone body (left-leaning, behind the T) -->
  <g filter="url(#shadow)" opacity="0.92">
    <!-- Mic capsule -->
    <rect x="148" y="100" width="80" height="160" rx="40" ry="40" fill="url(#mic)"/>
    <!-- Mic arc (the holder curve) -->
    <path d="M128 230 C128 300 188 350 228 350 C268 350 308 300 308 230"
          fill="none" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>
    <!-- Mic stand -->
    <line x1="218" y1="350" x2="218" y2="400" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>
    <!-- Mic base -->
    <line x1="178" y1="400" x2="258" y2="400" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Large bold "T" overlapping to the right -->
  <text x="320" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="320" font-weight="800" fill="#ffffff" text-anchor="middle"
        letter-spacing="-10" filter="url(#shadow)">T</text>

  <!-- Sound wave arcs (top-right corner) -->
  <g stroke="#c7d2fe" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M385 90 C405 115 405 145 385 170"/>
    <path d="M405 72 C435 112 435 155 405 190"/>
    <path d="M425 55 C465 108 465 170 425 210"/>
  </g>
</svg>
